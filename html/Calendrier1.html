<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dynamic Calendar</title>
    <link rel="stylesheet" href="../css/styles_cld.css">
</head>

<body>
    <header>
        <h1>
            <img src="../img/logo-efrei.png" id="logo" width="430" height="120">
            DEPARTEMENT INFORMATIQUE DE L'EFREI
        </h1>

        <nav>
            <a href="Accueil.html">Accueil</a>
            <a href="Formations.html">Formations</a>
            <a href="Temoignages.html">Témoignages</a>
            <a href="Apropos.html">A propos</a>
            <a href="Equipes.html">Equipes</a>
        </nav>
    </header>

    <div class="calendar">
        <div class="calendar-header">
            <button id="prev-month">‹</button>
            <div id="month-year"></div>
            <button id="next-month">›</button>
        </div>
        <div class="calendar-body">
            <div class="calendar-weekdays">
                <div>Dim</div>
                <div>Lun</div>
                <div>Mar</div>
                <div>Mer</div>
                <div>Jeu</div>
                <div>Ven</div>
                <div>Sam</div>
            </div>
            <div class="calendar-dates">

            </div>
        </div>
    </div>
    <footer>
        <p>Mentions légales</p>
        <p>Astrid BAERT, Gabriel LALLIER, Maximilien SOURIS</p>
        <a href="Contact.html">Contact</a>
    </footer>
    <script src="../js/Calendrier.js"></script>
</body>

</html>
